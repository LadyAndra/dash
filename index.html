<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3f6f5b" />
  <title>Dash</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Dash" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app"><!-- app.js builds the UI here --></div>
  <div id="toasts"></div>

  <!-- No build step: the browser runs these files exactly as uploaded (§13.1). -->
  <script type="module" src="js/app.js"></script>

  <!-- Offline-first: register the service worker so the app shell works with
       no network (data is local anyway). (§13.2 #6) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {
          /* not fatal — app still works online; see console */
        });
      });
    }
  </script>
</body>
</html>
